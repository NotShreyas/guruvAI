    function base64ToBlob(base64, mime) {
      const byteCharacters = atob(base64);
      const byteNumbers = new Array(byteCharacters.length);

      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }

      const byteArray = new Uint8Array(byteNumbers);
      return new Blob([byteArray], { type: mime });
    }

            console.log("voice file is:", data.voiceFile);
            const audioBlob = base64ToBlob(data.voiceFile, "audio/mpeg");
            const audioUrl = URL.createObjectURL(audioBlob);
            const player = document.getElementById("audio");
            player.src = audioUrl;
            player.play();
          }
          if (data.parameters.mistakes && data.parameters.mistakes.length > 0) {
            const blurrydiv = document.createElement("div");
            blurrydiv.id = "blurContainer";
            blurrydiv.className = "blurred";
            const overlay = document.createElement("div");
            overlay.id = "blurOverlay";
            overlay.innerHTML = "Click to reveal to mistakes";
            const blurredContent = document.createElement("div");
            blurredContent.id = "blurredContent";
            blurrydiv.appendChild(overlay);
            blurrydiv.appendChild(blurredContent);
            const msgbox = document.getElementById("msgbox");
            msgbox.appendChild(blurrydiv);
            data.parameters.mistakes.forEach((mistake) => {
              addBotMsg(mistake.mistake+"<br/>"+((mistake.correction)?mistake.correction:""), "blurredContent");
            });
            document
              .getElementById("blurContainer")
              .addEventListener("click", function () {
                // Toggle the "unblurred" class on click
                this.classList.toggle("unblurred");

                // Hide the overlay after unblurring
                const overlay = document.getElementById("blurOverlay");
                if (this.classList.contains("unblurred")) {
                  overlay.style.display = "none";
                } else {
                  overlay.style.display = "block";
                }
              });
          }
        });
      });
    }
    sendElement.addEventListener("click", () => {
      let inp = document.getElementById("msg");
      const msg = inp.value;
      addUserMsg(msg);
      inp.value = "";
      send_msg(msg);
    });
    justSendLatexElement.addEventListener("click", () => {
      //code = await editorElement.editor.export_("application/x-latex");
      console.log("code is:", code);
      addUserMsg("<i>You asked for analysising your input</i>");
      send_msg(code);
    });
    mistakesElement.addEventListener("click", () => {
      addUserMsg("<i>You asked for mistakes</i>");
      send_msg(code, "anal_math_mist");
    });
    solutionElement.addEventListener("click", () => {
      addUserMsg("<i>You asked for solution</i>");
      send_msg(code, "sol_math_ques");
    });
    //window.onload= () => editorElement.editor.import_("<math xmlns='http://www.w3.org/1998/Math/MathML'>\n  <mi> x </mi>\n</math>\n", "application/mathml+xml");
